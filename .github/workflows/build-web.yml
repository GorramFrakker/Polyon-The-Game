name: Build Web (pygbag) and Deploy to Azure

on:
  push:
    branches: [main, "claude/**"]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      SWA_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install pygame pygbag

      - name: Smoke test (headless)
        run: python tests/smoke_test.py

      - name: Bake processed assets (fast startup in the browser)
        run: python tools/bake_assets.py

      - name: Convert baked audio to OGG
        run: |
          for f in baked/snd_*.wav; do
            ffmpeg -loglevel error -y -i "$f" "${f%.wav}.ogg"
            rm "$f"
          done
          ls baked/

      # tests/ and tools/ are build-time only; pygbag tries to transform
      # every .py it finds and chokes on the bake script
      - name: Remove build-time files before packaging
        run: rm -rf tests tools build

      # baked WAVs are tiny and play fine in the browser; pygbag merely
      # prefers OGG and errors without this flag
      - name: Build web bundle
        run: python -m pygbag --disable-sound-format-error --build .

      - name: Verify archive is valid gzip
        run: python -c "assert open('build/web/polyon-the-game.tar.gz','rb').read(2) == b'\x1f\x8b', 'archive is not gzipped'"

      # Azure SWA serves *.gz with Content-Encoding gzip, so browsers
      # transparently decompress and pygbag's loader gets a plain tar.
      # Serve the archive as an opaque .bin and rewrite the original URL.
      - name: Add Azure SWA config for the game archive
        run: |
          mv build/web/polyon-the-game.tar.gz build/web/polyon-the-game.bin
          cat > build/web/staticwebapp.config.json <<'EOF'
          {
            "routes": [
              {
                "route": "/polyon-the-game.tar.gz",
                "rewrite": "/polyon-the-game.bin",
                "headers": {
                  "Content-Type": "application/octet-stream",
                  "Cache-Control": "no-cache"
                }
              },
              {
                "route": "/index.html",
                "headers": { "Cache-Control": "no-cache" }
              },
              {
                "route": "/",
                "headers": { "Cache-Control": "no-cache" }
              }
            ],
            "mimeTypes": {
              ".bin": "application/octet-stream",
              ".apk": "application/octet-stream"
            }
          }
          EOF

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: PolyonTheGame-Web
          path: build/web

      - name: Deploy to Azure Static Web Apps
        if: env.SWA_TOKEN != '' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/claude/'))
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: build/web
          output_location: ""
          skip_app_build: true
