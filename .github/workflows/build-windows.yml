name: Build Windows Executable

on:
  push:
    branches: [main, "claude/**"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install pygame pyinstaller

      - name: Smoke test (headless)
        run: python tests/smoke_test.py

      - name: Build executable
        run: pyinstaller --onefile --windowed --name PolyonTheGame polyon_the_game.py

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: PolyonTheGame-Windows
          path: dist/PolyonTheGame.exe

      - name: Attach executable to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PolyonTheGame.exe
          name: "POLYON: The Game ${{ github.ref_name }}"
          body: |
            Single-file Windows executable. Download `PolyonTheGame.exe`
            below and double-click to play. No installation required.
